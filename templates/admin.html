{% extends 'base.html' %}
{% block content %}

<div class="card">
    <div style="font-weight:bold; margin-bottom:8px;">Paste JSON to Auto-fill</div>
    <textarea id="json_input" placeholder='Paste JSON here...' rows="4"
        style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; font-size:13px; font-family:monospace;"></textarea>
    <button type="button" onclick="fillFromJSON()"
        style="width:100%; padding:12px; background:#1565c0; color:white; border:none; border-radius:8px; font-size:15px; cursor:pointer;">
        Auto-fill Form
    </button>
</div>

<div class="card">
    <div style="font-weight:bold; margin-bottom:12px;">Add New IPO</div>
    <form method="POST">
        <input name="name" placeholder="IPO Name" required
            style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; font-size:14px;">
        <input name="sector" placeholder="Sector (e.g. Hydropower)" required
            style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; font-size:14px;">
        <input name="rating" placeholder="Rating (e.g. BB+)"
            style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; font-size:14px;">
        <input name="open_date" placeholder="Open Date (e.g. Ashad 3, 2083)"
            style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; font-size:14px;">
        <input name="close_date" placeholder="Close Date (e.g. Ashad 7, 2083)"
            style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; font-size:14px;">
        <input name="shares_available" placeholder="Shares Available (e.g. 1,427,600 units)"
            style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; font-size:14px;">
        <input name="reason" placeholder="One line reason" required
            style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; font-size:14px;">
        <textarea name="vision" placeholder="Company vision (2-3 sentences)" rows="2"
            style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; font-size:14px;"></textarea>
        <textarea name="promoters" placeholder="Promoters info (2-3 sentences)" rows="2"
            style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; font-size:14px;"></textarea>
        <textarea name="past_performance" placeholder="Past performance (2-3 sentences)" rows="2"
            style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; font-size:14px;"></textarea>
        <textarea name="ipo_motive" placeholder="IPO motive (1-2 sentences)" rows="2"
            style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; font-size:14px;"></textarea>
        <textarea name="liabilities" placeholder="Liabilities (1-2 sentences)" rows="2"
            style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; font-size:14px;"></textarea>
        <textarea name="verdict" placeholder="Full verdict (2-3 sentences)" rows="2"
            style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; font-size:14px;"></textarea>
        <select name="is_good"
            style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; font-size:14px;">
            <option value="true">✅ Good — Recommend Apply</option>
            <option value="false">❌ Skip — Not Recommended</option>
        </select>
        <button type="submit"
            style="width:100%; padding:12px; background:#1a1a2e; color:white; border:none; border-radius:8px; font-size:15px; cursor:pointer;">
            Add IPO
        </button>
    </form>
</div>

{% if ipos %}
<div style="font-weight:bold; margin-bottom:8px; color:#555; font-size:13px;">CURRENT IPOs</div>
{% for ipo in ipos %}
<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
    <div>
        <div style="font-weight:bold;">{{ ipo.name }}</div>
        <div style="font-size:12px; color:#999;">{{ ipo.sector }} · {{ ipo.rating }}</div>
        <div style="font-size:13px; color:{% if ipo.is_good %}#2e7d32{% else %}#c62828{% endif %};">{{ ipo.reason }}</div>
    </div>
    <a href="/admin/delete/{{ ipo.id }}"
        style="color:#c62828; font-size:12px; text-decoration:none; margin-left:12px;">Delete</a>
</div>
{% endfor %}
{% endif %}

<script>
function fillFromJSON() {
    try {
        const raw = document.getElementById('json_input').value.trim();
        const data = JSON.parse(raw);

        if (data.name) document.querySelector('input[name="name"]').value = data.name;
        if (data.sector) document.querySelector('input[name="sector"]').value = data.sector;
        if (data.rating) document.querySelector('input[name="rating"]').value = data.rating;
        if (data.reason) document.querySelector('input[name="reason"]').value = data.reason;
        if (data.open_date) document.querySelector('input[name="open_date"]').value = data.open_date;
        if (data.close_date) document.querySelector('input[name="close_date"]').value = data.close_date;
        if (data.shares_available) document.querySelector('input[name="shares_available"]').value = data.shares_available;
        if (data.vision) document.querySelector('textarea[name="vision"]').value = data.vision;
        if (data.promoters) document.querySelector('textarea[name="promoters"]').value = data.promoters;
        if (data.past_performance) document.querySelector('textarea[name="past_performance"]').value = data.past_performance;
        if (data.ipo_motive) document.querySelector('textarea[name="ipo_motive"]').value = data.ipo_motive;
        if (data.liabilities) document.querySelector('textarea[name="liabilities"]').value = data.liabilities;
        if (data.verdict) document.querySelector('textarea[name="verdict"]').value = data.verdict;
        if (data.is_good !== undefined) document.querySelector('select[name="is_good"]').value = data.is_good ? 'true' : 'false';

        document.getElementById('json_input').value = '';
        alert('Form filled! Review and click Add IPO.');
    } catch(e) {
        alert('Invalid JSON. Please check and try again.');
    }
}
</script>

{% endblock %}
