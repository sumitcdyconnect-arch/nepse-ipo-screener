<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEPSE IPO Screener</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        .header { background: #1a1a2e; color: white; padding: 16px 20px; text-align: center; }
        .header h1 { font-size: 20px; }
        .nav { display: flex; background: white; border-bottom: 1px solid #eee; }
        .nav a { flex: 1; text-align: center; padding: 12px; text-decoration: none; color: #555; font-size: 14px; }
        .nav a.active { color: #1a1a2e; font-weight: bold; border-bottom: 2px solid #1a1a2e; }
        .container { padding: 16px; max-width: 480px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <div class="header"><h1>NEPSE IPO Screener</h1></div>
    <nav class="nav">
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">IPOs</a>
        <a href="/tracker" class="{% if request.path == '/tracker' %}active{% endif %}">Tracker</a>
        <a href="/allotment" class="{% if request.path == '/allotment' %}active{% endif %}">Allotment</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
